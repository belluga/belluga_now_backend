name: Laravel CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - ready_for_review
    branches:
      - dev
      - stage
      - main
  push:
    branches:
      - dev
      - stage
      - main
      - cicd-implementation

concurrency:
  group: laravel-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lane_policy:
    name: Lane Promotion Policy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4

      - name: Enforce branch promotion lanes
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          BASE_REF="${BASE_REF:-}"
          HEAD_REF="${HEAD_REF:-}"
          PR_HEAD_SHA="${PR_HEAD_SHA:-}"
          EXPECTED_SHA="$(printf '%s\n' "${PR_HEAD_SHA}" | tr -d '\r' | tr '[:upper:]' '[:lower:]')"

          if [[ -z "$BASE_REF" || -z "$HEAD_REF" || -z "$PR_HEAD_SHA" ]]; then
            echo "ERROR: missing pull request branch context (base/head)." >&2
            exit 1
          fi

          case "$BASE_REF" in
            stage)
              [[ "$HEAD_REF" == "dev" ]] || { echo "ERROR: only 'dev' may target 'stage' (received '$HEAD_REF' -> '$BASE_REF')." >&2; exit 1; }
              if [[ ! "${EXPECTED_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
                echo "ERROR: invalid PR head SHA lock '${EXPECTED_SHA}'." >&2
                exit 1
              fi
              git fetch origin "${PR_HEAD_SHA}" --quiet || true
              git fetch origin "${EXPECTED_SHA}" --quiet || true
              if ! git cat-file -e "${PR_HEAD_SHA}^{commit}" 2>/dev/null; then
                echo "ERROR: unable to resolve PR head SHA ${PR_HEAD_SHA}." >&2
                exit 1
              fi
              if ! git cat-file -e "${EXPECTED_SHA}^{commit}" 2>/dev/null; then
                echo "ERROR: unable to resolve Expected SHA ${EXPECTED_SHA}." >&2
                exit 1
              fi
              if ! git merge-base --is-ancestor "${EXPECTED_SHA}" "${PR_HEAD_SHA}"; then
                echo "ERROR: PR head SHA ${PR_HEAD_SHA} does not contain expected lock ${EXPECTED_SHA}." >&2
                exit 1
              fi
              ;;
            main)
              [[ "$HEAD_REF" == "stage" ]] || { echo "ERROR: only 'stage' may target 'main' (received '$HEAD_REF' -> '$BASE_REF')." >&2; exit 1; }
              if [[ ! "${EXPECTED_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
                echo "ERROR: invalid PR head SHA lock '${EXPECTED_SHA}'." >&2
                exit 1
              fi
              git fetch origin "${PR_HEAD_SHA}" --quiet || true
              git fetch origin "${EXPECTED_SHA}" --quiet || true
              if ! git cat-file -e "${PR_HEAD_SHA}^{commit}" 2>/dev/null; then
                echo "ERROR: unable to resolve PR head SHA ${PR_HEAD_SHA}." >&2
                exit 1
              fi
              if ! git cat-file -e "${EXPECTED_SHA}^{commit}" 2>/dev/null; then
                echo "ERROR: unable to resolve Expected SHA ${EXPECTED_SHA}." >&2
                exit 1
              fi
              if ! git merge-base --is-ancestor "${EXPECTED_SHA}" "${PR_HEAD_SHA}"; then
                echo "ERROR: PR head SHA ${PR_HEAD_SHA} does not contain expected lock ${EXPECTED_SHA}." >&2
                exit 1
              fi
              ;;
            dev)
              echo "OK: '$HEAD_REF' -> '$BASE_REF' allowed for development integration."
              ;;
            *)
              echo "ERROR: unsupported base branch '$BASE_REF'. Allowed bases: dev, stage, main." >&2
              exit 1
              ;;
          esac

          echo "OK: lane promotion policy passed for '$HEAD_REF' -> '$BASE_REF'."

      - name: Skip lane policy on non-PR events
        if: github.event_name != 'pull_request'
        run: |
          echo "SKIP: lane policy is only enforced for pull_request events."

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - lane_policy
    if: ${{ github.event_name != 'pull_request' || needs.lane_policy.result == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mongodb, mbstring, xml, ctype, dom, fileinfo, tokenizer, openssl
          tools: composer:v2
          coverage: none

      - name: PHP and Composer diagnostics
        run: |
          php --version
          php -m
          composer --version
          php -m | grep -i '^mongodb$'

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist --no-scripts

      - name: Start MongoDB replica set
        run: |
          docker run -d --name mongo-rs -p 27017:27017 mongo:7.0 --replSet rs0 --bind_ip_all

          for i in {1..60}; do
            if docker exec mongo-rs mongosh --quiet --eval "db.adminCommand({ ping: 1 }).ok" >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          docker exec mongo-rs mongosh --quiet --eval 'try { rs.status().ok } catch (err) { rs.initiate({_id:"rs0", members:[{_id:0, host:"localhost:27017"}]}) }'

          for i in {1..60}; do
            state="$(docker exec mongo-rs mongosh --quiet --eval 'try { rs.status().myState } catch (err) { 0 }' | tr -d '\r')"
            if [[ "$state" == "1" ]]; then
              echo "MongoDB replica set is primary"
              exit 0
            fi
            sleep 1
          done

          echo "MongoDB replica set did not become primary in time"
          docker logs mongo-rs || true
          exit 1

      - name: Wait for MongoDB client readiness
        env:
          DB_URI_LANDLORD: mongodb://localhost:27017/landlord_test?replicaSet=rs0&directConnection=true
        run: |
          php -r '
          $uri = getenv("DB_URI_LANDLORD");
          $ok = false;

          for ($i = 0; $i < 60; $i++) {
              try {
                  $manager = new MongoDB\Driver\Manager($uri);
                  $manager->executeCommand("admin", new MongoDB\Driver\Command(["ping" => 1]));
                  $ok = true;
                  break;
              } catch (Throwable $e) {
                  usleep(500000);
              }
          }

          if (!$ok) {
              fwrite(STDERR, "MongoDB client readiness check failed\\n");
              exit(1);
          }

          echo "MongoDB client readiness check passed\\n";
          '

      - name: Prepare Laravel writable directories
        run: |
          mkdir -p bootstrap/cache
          mkdir -p storage/framework/cache
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/testing
          mkdir -p storage/framework/views
          mkdir -p storage/logs
          chmod -R ug+rwX bootstrap/cache storage

      - name: Run Laravel full test suite
        env:
          APP_ENV: testing
          APP_KEY: base64:GmmALtgdmR+nNYciHr0ynX/QoqHXmoXXtbwHVNWg8Pk=
          APP_FAKER_LOCALE: pt_BR
          DB_CONNECTION_LANDLORD: landlord
          DB_CONNECTION_TENANTS: tenant
          DB_URI: mongodb://localhost:27017/landlord_test?replicaSet=rs0&directConnection=true
          DB_URI_LANDLORD: mongodb://localhost:27017/landlord_test?replicaSet=rs0&directConnection=true
          DB_URI_TENANTS: mongodb://localhost:27017/tenants_test?replicaSet=rs0&directConnection=true
          DB_DATABASE: landlord_test
          DB_DATABASE_LANDLORD: landlord_test
          DB_DATABASE_TENANTS: tenants_test
        run: php artisan test

      - name: Stop MongoDB
        if: always()
        run: docker rm -f mongo-rs || true

  notify_orchestrator:
    name: Notify Docker Promotion Status
    runs-on: ubuntu-latest
    needs:
      - lane_policy
      - test
    if: ${{ always() && github.event_name == 'pull_request' && (github.base_ref == 'stage' || github.base_ref == 'main') }}
    env:
      DOCKER_REPO_DISPATCH_TOKEN: ${{ secrets.DOCKER_REPO_DISPATCH_TOKEN || secrets.SUBMODULES_REPO_TOKEN || secrets.WEB_APP_REPO_TOKEN }}
      DOCKER_SYNC_TARGET_REPO: ${{ vars.DOCKER_SYNC_TARGET_REPO }}
      LANE_POLICY_RESULT: ${{ needs.lane_policy.result }}
      TEST_RESULT: ${{ needs.test.result }}
    steps:
      - name: Validate dispatch configuration
        run: |
          set -euo pipefail

          missing=()
          if [[ -z "${DOCKER_REPO_DISPATCH_TOKEN:-}" ]]; then
            missing+=("DOCKER_REPO_DISPATCH_TOKEN")
          fi
          if [[ -z "${DOCKER_SYNC_TARGET_REPO:-}" ]]; then
            missing+=("DOCKER_SYNC_TARGET_REPO")
          fi

          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "ERROR: missing docker callback configuration (${missing[*]})." >&2
            exit 1
          fi

      - name: Resolve callback payload
        id: payload
        run: |
          set -euo pipefail

          if [[ "${LANE_POLICY_RESULT}" == "success" && "${TEST_RESULT}" == "success" ]]; then
            result="success"
          else
            result="failure"
          fi

          pr_number="$(jq -r '.pull_request.number // empty' "${GITHUB_EVENT_PATH}")"
          pr_url="$(jq -r '.pull_request.html_url // empty' "${GITHUB_EVENT_PATH}")"
          expected_sha="$(jq -r '.pull_request.head.sha // empty' "${GITHUB_EVENT_PATH}" | tr -d '\r' | tr '[:upper:]' '[:lower:]')"

          echo "result=${result}" >> "$GITHUB_OUTPUT"
          echo "pr_number=${pr_number}" >> "$GITHUB_OUTPUT"
          echo "pr_url=${pr_url}" >> "$GITHUB_OUTPUT"
          echo "expected_sha=${expected_sha}" >> "$GITHUB_OUTPUT"

      - name: Dispatch source promotion status
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ env.DOCKER_REPO_DISPATCH_TOKEN }}
          repository: ${{ env.DOCKER_SYNC_TARGET_REPO }}
          event-type: lane-promotion-source-pr-status
          client-payload: >-
            {
              "source_repo": "${{ github.repository }}",
              "head": "${{ github.head_ref }}",
              "base": "${{ github.base_ref }}",
              "source_pr_number": "${{ steps.payload.outputs.pr_number }}",
              "source_pr_url": "${{ steps.payload.outputs.pr_url }}",
              "expected_sha": "${{ steps.payload.outputs.expected_sha }}",
              "result": "${{ steps.payload.outputs.result }}"
            }

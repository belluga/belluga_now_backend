name: Laravel CI

on:
  pull_request:
  push:
    branches:
      - dev
      - stage
      - main
      - cicd-implementation

concurrency:
  group: laravel-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      mongo:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mongodb, mbstring, xml, ctype, dom, fileinfo, tokenizer, openssl
          tools: composer:v2
          coverage: none

      - name: PHP and Composer diagnostics
        run: |
          php --version
          php -m
          composer --version
          php -m | grep -i '^mongodb$'

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist --no-scripts

      - name: Wait for local MongoDB service
        run: |
          for i in {1..30}; do
            if mongosh --quiet --host 127.0.0.1 --eval "db.adminCommand({ ping: 1 }).ok" >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

          mongosh --quiet --host 127.0.0.1 --eval "db.adminCommand({ ping: 1 })"

      - name: Run Laravel unit suite
        env:
          APP_ENV: testing
          DB_URI: mongodb://127.0.0.1:27017/landlord_test
          DB_URI_LANDLORD: mongodb://127.0.0.1:27017/landlord_test
          DB_URI_TENANTS: mongodb://127.0.0.1:27017/tenants_test
          DB_DATABASE: landlord_test
          DB_DATABASE_LANDLORD: landlord_test
          DB_DATABASE_TENANTS: tenants_test
        run: php artisan test --testsuite=Unit

name: Laravel CI

on:
  pull_request:
  push:
    branches:
      - dev
      - stage
      - main
      - cicd-implementation

concurrency:
  group: laravel-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      mongo:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mongodb, mbstring, xml, ctype, dom, fileinfo, tokenizer, openssl
          tools: composer:v2
          coverage: none

      - name: PHP and Composer diagnostics
        run: |
          php --version
          php -m
          composer --version
          php -m | grep -i '^mongodb$'

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist --no-scripts

      - name: Wait for MongoDB TCP readiness
        run: |
          python3 - <<'PY'
          import socket
          import sys
          import time

          host, port = "127.0.0.1", 27017
          for attempt in range(60):
              sock = socket.socket()
              sock.settimeout(1)
              try:
                  sock.connect((host, port))
                  print(f"MongoDB reachable at {host}:{port}")
                  sock.close()
                  sys.exit(0)
              except OSError:
                  time.sleep(1)
              finally:
                  sock.close()

          print(f"MongoDB not reachable at {host}:{port} after timeout", file=sys.stderr)
          sys.exit(1)
          PY

      - name: Initialize MongoDB replica set
        run: |
          MONGO_CID="$(docker ps -q --filter 'name=mongo' | head -n 1)"
          if [[ -z "$MONGO_CID" ]]; then
            echo "MongoDB service container not found"
            docker ps -a
            exit 1
          fi

          docker exec "$MONGO_CID" mongosh --quiet --eval 'try { rs.status().ok } catch (err) { rs.initiate({_id:"rs0", members:[{_id:0, host:"127.0.0.1:27017"}]}) }'

          for i in {1..30}; do
            state="$(docker exec "$MONGO_CID" mongosh --quiet --eval 'try { rs.status().myState } catch (err) { 0 }' | tr -d '\r')"
            if [[ "$state" == "1" ]]; then
              echo "MongoDB replica set is primary"
              exit 0
            fi
            sleep 2
          done

          echo "MongoDB replica set did not become primary in time"
          docker logs "$MONGO_CID" || true
          exit 1

      - name: Run Laravel unit suite
        env:
          APP_ENV: testing
          DB_URI: mongodb://127.0.0.1:27017/landlord_test?replicaSet=rs0
          DB_URI_LANDLORD: mongodb://127.0.0.1:27017/landlord_test?replicaSet=rs0
          DB_URI_TENANTS: mongodb://127.0.0.1:27017/tenants_test?replicaSet=rs0
          DB_DATABASE: landlord_test
          DB_DATABASE_LANDLORD: landlord_test
          DB_DATABASE_TENANTS: tenants_test
        run: php artisan test --testsuite=Unit
